<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DelayedNotifier</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f4f6f9; color: #333; padding: 24px; }
    h1 { font-size: 1.6rem; margin-bottom: 24px; }
    h2 { font-size: 1.1rem; margin-bottom: 12px; color: #555; }

    .card {
      background: #fff;
      border-radius: 8px;
      padding: 20px 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,.1);
      margin-bottom: 24px;
    }

    form label { display: block; font-size: .85rem; color: #666; margin-bottom: 2px; margin-top: 12px; }
    form label:first-of-type { margin-top: 0; }
    form input, form select, form textarea {
      width: 100%; padding: 8px 10px; border: 1px solid #ccc;
      border-radius: 5px; font-size: .95rem;
    }
    form textarea { height: 70px; resize: vertical; }
    button.submit {
      margin-top: 16px; padding: 9px 22px; background: #4f7ef8;
      color: #fff; border: none; border-radius: 5px; cursor: pointer; font-size: .95rem;
    }
    button.submit:hover { background: #3a68e0; }

    #msg { margin-top: 10px; font-size: .9rem; }
    #msg.ok { color: green; }
    #msg.err { color: red; }

    table { width: 100%; border-collapse: collapse; font-size: .9rem; }
    th { background: #f0f2f5; text-align: left; padding: 8px 10px; border-bottom: 2px solid #ddd; }
    td { padding: 8px 10px; border-bottom: 1px solid #eee; vertical-align: middle; }
    tr:hover td { background: #fafbff; }

    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 12px;
      font-size: .78rem; font-weight: 600; text-transform: uppercase;
    }
    .badge-pending   { background: #fff3cd; color: #856404; }
    .badge-queued    { background: #cfe2ff; color: #084298; }
    .badge-sent      { background: #d1e7dd; color: #0f5132; }
    .badge-failed    { background: #f8d7da; color: #842029; }
    .badge-cancelled { background: #e2e3e5; color: #41464b; }

    button.cancel-btn {
      padding: 4px 12px; background: #dc3545; color: #fff;
      border: none; border-radius: 4px; cursor: pointer; font-size: .82rem;
    }
    button.cancel-btn:hover { background: #bb2d3b; }
    button.cancel-btn:disabled { background: #aaa; cursor: default; }

    .empty { text-align: center; color: #aaa; padding: 20px 0; }
    .refresh-note { font-size: .8rem; color: #aaa; margin-top: 6px; }
  </style>
</head>
<body>

<h1>DelayedNotifier</h1>

<div class="card">
  <h2>Create notification</h2>
  <form id="form">
    <label>Title *</label>
    <input type="text" id="title" placeholder="Meeting reminder" required>

    <label>Message *</label>
    <textarea id="message" placeholder="Don't forget your 3pm meeting!"></textarea>

    <label>Channel</label>
    <select id="channel">
      <option value="log">Log (default)</option>
      <option value="email">Email</option>
      <option value="telegram">Telegram</option>
    </select>

    <label>Recipient</label>
    <input type="text" id="recipient" placeholder="user@example.com or @username">

    <label>Scheduled at (local time) *</label>
    <input type="datetime-local" id="scheduled_at" required>

    <button type="submit" class="submit">Schedule notification</button>
    <div id="msg"></div>
  </form>
</div>

<div class="card">
  <h2>Notifications</h2>
  <p class="refresh-note">Auto-refreshes every 2 seconds</p>
  <table id="table">
    <thead>
      <tr>
        <th>Title</th>
        <th>Channel</th>
        <th>Recipient</th>
        <th>Scheduled at</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
  // Set default scheduled_at to 1 minute from now
  const now = new Date(Date.now() + 60000);
  document.getElementById('scheduled_at').value =
    now.toISOString().slice(0, 16);

  const msg = document.getElementById('msg');

  document.getElementById('form').addEventListener('submit', async (e) => {
    e.preventDefault();
    msg.textContent = '';
    msg.className = '';

    const raw = document.getElementById('scheduled_at').value;
    // datetime-local gives "YYYY-MM-DDTHH:mm", convert to RFC3339
    const dt = new Date(raw);
    const scheduled_at = dt.toISOString();

    const body = {
      title:        document.getElementById('title').value,
      message:      document.getElementById('message').value,
      channel:      document.getElementById('channel').value,
      recipient:    document.getElementById('recipient').value,
      scheduled_at,
    };

    try {
      const res = await fetch('/notify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (!res.ok) {
        msg.textContent = 'Error: ' + (data.error || res.statusText);
        msg.className = 'err';
      } else {
        msg.textContent = 'Created: ' + data.id;
        msg.className = 'ok';
        document.getElementById('form').reset();
        document.getElementById('scheduled_at').value =
          new Date(Date.now() + 60000).toISOString().slice(0, 16);
        loadNotifications();
      }
    } catch (err) {
      msg.textContent = 'Request failed: ' + err.message;
      msg.className = 'err';
    }
  });

  function badgeClass(status) {
    return 'badge badge-' + status;
  }

  function formatDate(iso) {
    return new Date(iso).toLocaleString();
  }

  async function loadNotifications() {
    try {
      const res = await fetch('/notify');
      if (!res.ok) return;
      const list = await res.json();

      // Sort by scheduled_at descending
      list.sort((a, b) => new Date(b.scheduled_at) - new Date(a.scheduled_at));

      const tbody = document.getElementById('tbody');
      if (list.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty">No notifications yet</td></tr>';
        return;
      }

      tbody.innerHTML = list.map(n => `
        <tr>
          <td><strong>${esc(n.title)}</strong><br><small>${esc(n.message)}</small></td>
          <td>${esc(n.channel)}</td>
          <td>${esc(n.recipient || '—')}</td>
          <td>${formatDate(n.scheduled_at)}</td>
          <td><span class="${badgeClass(n.status)}">${n.status}</span></td>
          <td>
            <button class="cancel-btn"
              ${['sent','cancelled','failed'].includes(n.status) ? 'disabled' : ''}
              onclick="cancelNotification('${esc(n.id)}', this)">
              Cancel
            </button>
          </td>
        </tr>
      `).join('');
    } catch (_) {}
  }

  async function cancelNotification(id, btn) {
    btn.disabled = true;
    try {
      const res = await fetch('/notify/' + id, { method: 'DELETE' });
      const data = await res.json();
      if (!res.ok) {
        alert(data.error || 'Failed to cancel');
        btn.disabled = false;
      } else {
        loadNotifications();
      }
    } catch (err) {
      alert('Request failed: ' + err.message);
      btn.disabled = false;
    }
  }

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  loadNotifications();
  setInterval(loadNotifications, 2000);
</script>
</body>
</html>
